<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Dollar Clock — The 1913 Index</title>
<meta name="description" content="Live counter: what $1 from 1913 costs today, per The 1913 Index vs official CPI.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon-192.png">
<meta name="theme-color" content="#0a0a0a">
<style>
/* Self-contained (embeddable) — mirrors the site's retro-ledger palette */
:root{--paper:#f4ecd8;--paper2:#efe4c8;--ink:#2b2317;--ink2:#4a3f2a;--red:#8c1c13;--gold:#9a7d2e;--rule:#c3b189;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;line-height:1.5;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 37px,rgba(140,28,19,.028) 37px,rgba(140,28,19,.028) 38px)}
.clock-wrap{max-width:760px;margin:0 auto;padding:26px 18px 20px;text-align:center}
.eyebrow{letter-spacing:.4em;text-transform:uppercase;font-size:.68rem;color:var(--ink2)}
h1{font-size:clamp(1.4rem,4vw,2rem);margin:.15em 0 .5em}
.card{background:var(--paper2);border:2px solid var(--ink);box-shadow:6px 6px 0 rgba(43,35,23,.18);padding:22px 16px}
.label{text-transform:uppercase;letter-spacing:.2em;font-size:.74rem;color:var(--ink2)}
.big{font-family:"Courier New",Courier,monospace;font-variant-numeric:tabular-nums;
  font-size:clamp(2.2rem,9vw,4.2rem);color:var(--red);font-weight:700;margin:.06em 0}
.sub{color:var(--ink2);font-style:italic;font-size:.95rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
@media(max-width:560px){.row{grid-template-columns:1fr}}
.mini{border:2px solid var(--ink);background:var(--paper2);padding:12px}
.mini .n{font-family:"Courier New",Courier,monospace;font-size:1.5rem;font-weight:700}
.mini.ours .n{color:var(--red)} .mini.cpi .n{color:var(--ink2)}
.toggle{margin:16px 0 4px}
.toggle button{font:inherit;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;
  background:var(--paper);border:2px solid var(--ink);padding:6px 14px;cursor:pointer;color:var(--ink)}
.toggle button.on{background:var(--ink);color:var(--paper)}
.src{font-size:.74rem;color:var(--ink2);margin-top:14px}
.src a{color:var(--red)}
</style>
</head>
<body>
<div class="clock-wrap">
  <div class="eyebrow">The 1913 Index · Live</div>
  <h1>The Dollar Clock</h1>

  <div class="card">
    <div class="label" id="clockLabel">What $1 from 1913 costs today</div>
    <div class="big" id="clockValue">$—</div>
    <div class="sub" id="clockSub">and rising</div>
  </div>

  <div class="row">
    <div class="mini ours">
      <div class="label">Purchasing power left</div>
      <div class="n" id="ppLeft">—¢</div>
      <div class="sub">of the original dollar</div>
    </div>
    <div class="mini cpi">
      <div class="label">Official CPI says</div>
      <div class="n" id="cpiValue">$—</div>
      <div class="sub" id="gapLine">gap: —</div>
    </div>
  </div>

  <div class="toggle">
    <button id="btn1913" class="on" onclick="setBase(1913)">Since 1913</button>
    <button id="btn1971" onclick="setBase(1971)">Since 1971 (gold window closed)</button>
  </div>

  <div class="src">Same goods, actual dollars — no substitution, no hedonics, real home prices.
    <a href="the-number.html">Methodology &amp; the number →</a></div>
</div>

<script src="series.js"></script>
<script>
// ── Fallback anchors (for off-site embeds where series.js isn't loaded) ─────
// Refreshed quarterly by the 1913-index-category-refresh task (step 7).
const ANCHORS = {
  end_year: 2026,
  idx: { 1913: 100, 1971: 423.36, now: 5280.56 },   // 1913 Index (1913=100)
  cpi: { 1913: 100, 1971: 406.12, now: 3419.59 },   // official CPI (1913=100)
  yoy: 4.26,                                        // latest 1913-Index YoY %
};

let base = 1913;

function getSeries() {
  try {
    if (window.SERIES && window.SERIES.rows && window.SERIES.rows.length) {
      const rows = window.SERIES.rows;
      const last = rows[rows.length - 1];
      const r71 = rows.find(r => r.y === 1971) || { idx: ANCHORS.idx[1971], cpi: ANCHORS.cpi[1971] };
      return { end_year: last.y, idx: { 1913: 100, 1971: r71.idx, now: last.idx },
               cpi: { 1913: 100, 1971: r71.cpi, now: last.cpi }, yoy: last.yoy || ANCHORS.yoy };
    }
  } catch (e) {}
  return ANCHORS;
}

// Continuous tick: compound the latest annual YoY rate from Jan 1 of the end year.
function liveMultiple(S, series) {
  const anchor = new Date(S.end_year, 0, 1).getTime();
  const yearsSince = Math.max(0, (Date.now() - anchor) / (365.25 * 24 * 3600 * 1000));
  const growth = Math.pow(1 + S.yoy / 100, yearsSince);
  return (series.now * growth) / series[base];
}

function fmtMoney(x) {
  return '$' + x.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
}

function render() {
  const S = getSeries();
  const ours = liveMultiple(S, S.idx);
  const cpi  = liveMultiple(S, S.cpi);
  document.getElementById('clockLabel').textContent = 'What $1 from ' + base + ' costs today';
  document.getElementById('clockValue').textContent = fmtMoney(ours);
  document.getElementById('clockSub').textContent =
    'the dollar has lost ' + (100 - 100 / ours).toFixed(1) + '% of its purchasing power since ' + base + ' — and it’s still ticking';
  document.getElementById('ppLeft').textContent = (100 / ours).toFixed(2) + '¢';
  document.getElementById('cpiValue').textContent = fmtMoney(cpi);
  document.getElementById('gapLine').textContent =
    'gap: ' + (ours / cpi).toFixed(2) + '× — what CPI doesn’t count';
}

function setBase(y) {
  base = y;
  document.getElementById('btn1913').classList.toggle('on', y === 1913);
  document.getElementById('btn1971').classList.toggle('on', y === 1971);
  render();
}

render();
setInterval(render, 250);

// ── Auto-height for iframe embeds ────────────────────────────────────────────
function postHeight() {
  try { parent.postMessage({ type: '1913-clock-height', height: document.body.scrollHeight }, '*'); } catch (e) {}
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
</script>
</body>
</html>
