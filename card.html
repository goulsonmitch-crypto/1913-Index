<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Share Card — The 1913 Index</title>
<meta name="description" content="Shareable price-history card for any tracked item on The 1913 Index.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/favicon.ico">
<meta name="theme-color" content="#0a0a0a">
<link rel="stylesheet" href="styles.css">
<style>
  #stage{max-width:920px;margin:0 auto;padding:20px}
  #cardwrap{border:2px solid var(--ink);box-shadow:6px 6px 0 rgba(43,35,23,.18);background:var(--paper2)}
  canvas{width:100%;height:auto;display:block}
  .btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .btns button{font:inherit;font-weight:700;background:var(--ink);color:var(--paper);border:none;padding:11px 18px;border-radius:6px;cursor:pointer}
  .btns button.alt{background:var(--red)}
  #msg{font-size:.85rem;color:var(--ink2);margin-top:10px;font-style:italic}
</style>
</head>
<body>
<script src="nav.js"></script>
<header class="mast"><div class="wrap">
  <div class="eyebrow">Share</div>
  <h1><a href="index.html">The 1913 Index</a></h1>
  <div class="sub">Shareable price-history card</div>
</div></header>
<div class="crumb"><div class="wrap"><a href="index.html">← Home</a><a href="data.html">Explore the Data</a><span class="here">Share card</span></div></div>

<div id="stage">
  <div id="cardwrap"><canvas id="card" width="1200" height="675"></canvas></div>
  <div class="btns">
    <button onclick="downloadPNG()">Download PNG</button>
    <button class="alt" onclick="sharePNG()">Share…</button>
  </div>
  <div id="msg">Loading item…</div>
</div>

<script src="database.js"></script>
<script>
// Same shard hash as build_corpus.js / item.html — keep in sync.
function shardOf(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return h%64;}
const params=new URLSearchParams(location.search);
const itemId=params.get('id')||'gas';
const item=(window.DB&&window.DB.items||[]).find(i=>i.id===itemId);
const msg=document.getElementById('msg');

function money(v){return v<1?(v*100).toFixed(0)+'¢':'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:2});}

function draw(series){
  const c=document.getElementById('card'),g=c.getContext('2d');
  g.fillStyle='#f4ecd8';g.fillRect(0,0,1200,675);
  g.fillStyle='#2b2317';g.fillRect(0,0,1200,10);g.fillRect(0,665,1200,10);
  g.fillStyle='#8c1c13';g.font='700 28px Georgia';g.fillText('THE 1913 INDEX — SAME GOODS, ACTUAL DOLLARS',60,72);
  g.fillStyle='#2b2317';g.font='700 54px Georgia';
  const name=item.name.length>38?item.name.slice(0,37)+'…':item.name;
  g.fillText(name,60,150);
  const mult=item.now_price/item.then_price;
  const multTxt=mult>=10?Math.round(mult)+'×':mult.toFixed(1)+'×';
  g.fillStyle='#8c1c13';g.font='700 150px Georgia';g.fillText(multTxt,60,320);
  g.fillStyle='#4a3f2a';g.font='italic 30px Georgia';
  g.fillText(money(item.then_price)+' in '+item.then_year+'  →  '+money(item.now_price)+' in '+item.now_year+(item.unit_display?'  ('+item.unit_display+')':''),60,375);
  if(series&&series.length>2){
    const xs=60,ys=430,W=1080,H=170;
    const ps=series.map(p=>p.price),mn=Math.min(...ps),mx=Math.max(...ps),rg=(mx-mn)||1;
    g.strokeStyle='#9a7d2e';g.lineWidth=4;g.beginPath();
    series.forEach((p,i)=>{const x=xs+(i/(series.length-1))*W,y=ys+H-((p.price-mn)/rg)*H;i?g.lineTo(x,y):g.moveTo(x,y);});
    g.stroke();
    g.fillStyle='#8c1c13';g.beginPath();
    const lx=xs+W,ly=ys+H-((ps[ps.length-1]-mn)/rg)*H;g.arc(lx,ly,9,0,7);g.fill();
    g.fillStyle='#4a3f2a';g.font='22px Georgia';
    g.fillText(String(series[0].year),xs,ys+H+34);g.fillText(String(series[series.length-1].year),xs+W-60,ys+H+34);
  } else {
    g.fillStyle='#4a3f2a';g.font='24px Georgia';
    g.fillText((item.tier===3?'Estimate — pending verification. ':'')+(item.source_then||''),60,470);
  }
  g.fillStyle='#2b2317';g.font='700 26px Georgia';
  g.fillText('the dollar keeps shrinking · scan any product → goulsonmitch-crypto.github.io/1913-Index',60,648);
  msg.textContent=item.name+' — '+multTxt+' since '+item.then_year+(item.tier===3?' (flagged estimate)':'');
}

async function blobOf(){return new Promise(r=>document.getElementById('card').toBlob(r,'image/png'));}
async function downloadPNG(){const b=await blobOf();const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=itemId+'-1913index.png';a.click();}
async function sharePNG(){
  const b=await blobOf();const f=new File([b],itemId+'-1913index.png',{type:'image/png'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[f]})){try{await navigator.share({files:[f],title:item.name+' — The 1913 Index'});return;}catch(e){}}
  downloadPNG();
}

if(!item){msg.textContent='Item not found: '+itemId;}
else{
  const s=document.createElement('script');
  s.src='corpus/shard-'+shardOf(itemId)+'.js';
  s.onload=()=>{try{
    // Shard format: window.CORPUS[itemId] = { s: startYear, v: [annual values], real, shape, realsrc }
    const rec=(window.CORPUS||{})[itemId];
    const series=rec&&rec.v?rec.v.map((p,i)=>({year:rec.s+i,price:p})):null;
    draw(series);
  }catch(e){draw(null);}};
  s.onerror=()=>draw(null);
  document.head.appendChild(s);
}
</script>
</body>
</html>
