<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Privacy Policy — 1913 Index</title>
<link rel="icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<script>
// ─── UPDATE THIS BLOCK WHEN ANYTHING CHANGES ────────────────────────────────
// This is the only section you need to edit to keep the policy current.
// After editing, update LAST_UPDATED and regenerate/redeploy.
const POLICY = {
  APP_NAME:         "1913 Index",
  CONTACT_EMAIL:    "goulsonmitch@gmail.com",
  WEBSITE:          "https://goulsonmitch-crypto.github.io/1913-Index",
  LAST_UPDATED:     "June 30, 2026",
  EFFECTIVE_DATE:   "June 30, 2026",

  // Set true/false to show/hide each section — no editing of prose needed
  USES_CAMERA:      true,   // For barcode scanning
  USES_LOCATION:    false,  // No location data collected
  USES_ANALYTICS:   false,  // No analytics (no GA, no Mixpanel, nothing)
  USES_ACCOUNTS:    false,  // No login, no accounts
  USES_PAYMENTS:    false,  // No purchases
  STORES_LOCALLY:   true,   // localStorage for scan history
  SENDS_UPC_DATA:   true,   // UPC submissions go to Cloudflare Worker

  // Third-party services used
  THIRD_PARTIES: [
    { name: "Cloudflare Workers", purpose: "Serves the barcode lookup API. UPCs you scan may be sent to this service to identify products.", policy_url: "https://www.cloudflare.com/privacypolicy/" },
    { name: "UPCitemdb", purpose: "Product database used to identify unknown barcodes. Your scanned UPC codes may be sent to this service.", policy_url: "https://www.upcitemdb.com/privacy" },
    { name: "Open Food Facts", purpose: "Open-source food product database used as a fallback for food items.", policy_url: "https://world.openfoodfacts.org/privacy" },
    { name: "GitHub Pages", purpose: "Hosts the website and price database. No personal data is transmitted.", policy_url: "https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement" },
  ],
};
// ────────────────────────────────────────────────────────────────────────────
</script>
<style>
  :root { --bg:#0a0a0a; --surface:#141414; --card:#1c1c1e; --border:#2c2c2e; --gold:#c9a84c; --text:#f0f0f0; --muted:#8e8e93; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:0; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:16px; }
  header a { color:var(--gold); text-decoration:none; font-weight:600; font-size:.9rem; }
  header h1 { font-size:1rem; font-weight:700; }
  main { max-width:720px; margin:0 auto; padding:32px 24px 80px; }
  .meta { font-size:.8rem; color:var(--muted); margin-bottom:32px; }
  h2 { font-size:1.1rem; font-weight:700; color:var(--gold); margin:32px 0 10px; }
  h3 { font-size:.95rem; font-weight:700; margin:20px 0 8px; }
  p { font-size:.9rem; line-height:1.7; color:#d0d0d0; margin-bottom:12px; }
  ul { padding-left:20px; margin-bottom:12px; }
  li { font-size:.9rem; line-height:1.7; color:#d0d0d0; margin-bottom:4px; }
  .highlight { background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2); border-radius:10px; padding:14px 18px; margin:16px 0; }
  .highlight p { margin:0; font-size:.88rem; }
  table { width:100%; border-collapse:collapse; margin:12px 0; font-size:.85rem; }
  td, th { padding:10px 12px; border:1px solid var(--border); text-align:left; vertical-align:top; }
  th { background:var(--card); color:var(--muted); font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.06em; }
  a { color:var(--gold); }
  .divider { border:none; border-top:1px solid var(--border); margin:32px 0; }
  .contact-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-top:24px; }
  .contact-card h3 { margin-top:0; }
</style>
</head>
<body>
<header>
  <a href="index.html">← 1913 Index</a>
  <h1>Privacy Policy</h1>
</header>

<main id="main">
  <!-- Content injected by script below -->
</main>

<script>
const P = POLICY;
const d = document.getElementById('main');

function section(title, content) {
  return `<h2>${title}</h2>${content}`;
}

let html = `
<p class="meta">Last updated: ${P.LAST_UPDATED} &nbsp;·&nbsp; Effective: ${P.EFFECTIVE_DATE}</p>

<div class="highlight">
  <p><strong>Short version:</strong> ${P.APP_NAME} does not create accounts, does not collect personal information, does not run advertising trackers, and does not sell data. The only data that leaves your device is the UPC barcode number when you scan a product — and only to identify what it is.</p>
</div>

${section('Who we are', `
<p>${P.APP_NAME} is an independent inflation tracker built and operated by an individual developer. Contact: <a href="mailto:${P.CONTACT_EMAIL}">${P.CONTACT_EMAIL}</a>. Website: <a href="${P.WEBSITE}">${P.WEBSITE}</a>.</p>
`)}

${section('What data we collect', `
${P.USES_CAMERA ? `
<h3>Camera access</h3>
<p>The barcode scanner requires access to your device camera. <strong>Camera images are processed entirely on your device.</strong> We never upload, transmit, or store photos or video frames. The camera is used only to detect barcode numbers, and only while the scan screen is open.</p>
` : ''}

${P.SENDS_UPC_DATA ? `
<h3>Barcode (UPC) numbers</h3>
<p>When you scan a product, the barcode number (UPC/EAN) is sent to our lookup API to identify the product. UPC numbers are not personally identifiable — they identify product types, not individuals. We may store UPC-to-product mappings permanently to improve the database for all users.</p>
<p>If you voluntarily submit a product correction, we store the UPC, product name, and your suggested category. No name, email, or account information is collected with submissions.</p>
` : ''}

${P.STORES_LOCALLY ? `
<h3>Scan history (stored on your device only)</h3>
<p>Your recent scan history is saved in your device's local storage (localStorage) so you can revisit items you've scanned. This data never leaves your device. You can clear it any time by clearing your browser/app storage or deleting the app.</p>
` : ''}

<h3>What we do NOT collect</h3>
<ul>
  <li>No name, email address, or any personally identifying information</li>
  <li>No account registration or login</li>
  <li>No location or GPS data</li>
  <li>No advertising identifiers (IDFA, GAID)</li>
  <li>No crash analytics or usage analytics</li>
  <li>No payment information</li>
  <li>No contact list, photos library, or any other device data</li>
</ul>
`)}

${section('Third-party services', `
<p>The following third-party services may receive your UPC data as part of product lookup:</p>
<table>
  <tr><th>Service</th><th>Purpose</th><th>Their privacy policy</th></tr>
  ${P.THIRD_PARTIES.map(t => `<tr><td><strong>${t.name}</strong></td><td>${t.purpose}</td><td><a href="${t.policy_url}" target="_blank">View →</a></td></tr>`).join('')}
</table>
<p>We have no advertising relationships and receive no revenue from any of these services. They are used solely to make the product lookup work.</p>
`)}

${section('How we use data', `
<p>The only data we process:</p>
<ul>
  <li><strong>UPC numbers you scan</strong> — used to look up the product and match it to a 1913 Index price category. Stored server-side only if it represents a new product mapping that helps other users.</li>
  <li><strong>Crowdsource submissions</strong> — product name + category you suggest when fixing a wrong match. Used to improve the product database. Not linked to you in any way.</li>
</ul>
<p>We do not sell data. We do not use data for advertising. We do not share data with any party except the third-party lookup services listed above, and only to the extent necessary to identify a scanned product.</p>
`)}

${section('Data retention', `
<p><strong>On your device:</strong> Scan history is stored until you clear it or uninstall the app.</p>
<p><strong>On our servers:</strong> Approved UPC→product mappings are retained indefinitely as part of the product database. Pending/rejected crowdsource submissions are deleted within 90 days.</p>
<p>There is no account data to delete because we never collect it.</p>
`)}

${section('Children\'s privacy', `
<p>${P.APP_NAME} is not directed at children under 13. We do not knowingly collect any information from children. If you believe a child has submitted information, contact us at <a href="mailto:${P.CONTACT_EMAIL}">${P.CONTACT_EMAIL}</a> and we will delete it.</p>
`)}

${section('Your rights', `
<p>Since we collect no personal information, there is no personal data to access, correct, or delete. Your scan history is entirely on your own device — clear it in your device/browser settings.</p>
<p>If you submitted a product correction and want it removed, email us with the UPC and approximate date and we will delete it.</p>
`)}

${section('Changes to this policy', `
<p>If we make material changes (such as starting to collect new categories of data), we will update the "Last updated" date above and, where appropriate, provide notice in the app. The current policy is always at <a href="${P.WEBSITE}/privacy.html">${P.WEBSITE}/privacy.html</a>.</p>
<p>Updating this policy is a one-file change — edit the <code>POLICY</code> config block at the top of this page and redeploy.</p>
`)}

<hr class="divider">

<div class="contact-card">
  <h3>Contact</h3>
  <p>Questions about this privacy policy: <a href="mailto:${P.CONTACT_EMAIL}">${P.CONTACT_EMAIL}</a></p>
  <p style="margin:0;font-size:.82rem;color:var(--muted)">Response time: typically within 48 hours.</p>
</div>
`;

d.innerHTML = html;
</script>
</body>
</html>
